name: Dagelijkse Weer-Quiz

on:
  schedule:
    - cron: '0 7 * * *' 
  workflow_dispatch: 

jobs:
  quiz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installeer requests
        run: pip install requests

      - name: Verstuur quizvraag
        env:
          VRAGEN_WEBHOOK: ${{ secrets.VRAGEN_WEBHOOK }}
        run: python quiz.py
