name: Weerhistorie

on:
  workflow_dispatch:
  schedule:
    # Zomertijd (nu): 05:30 Nederlandse tijd (03:30 UTC)
    # Wintertijd: 05:30 Nederlandse tijd (04:30 UTC)
    - cron: '30 3 * * *'

jobs:
  historie:
    runs-on: ubuntu-latest

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Requests installeren
        run: pip install requests

      - name: Bericht sturen
        env:
          HISTORIE_WEBHOOK: ${{ secrets.HISTORIE_WEBHOOK }}
        run: python weerhistorie.py
