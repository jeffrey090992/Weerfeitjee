name: Weerhistorie

on:
  workflow_dispatch:
  schedule:
    # Draait om 06:30 UTC
    # Zomertijd (nu): 08:30 Nederlandse tijd
    # Wintertijd: 07:30 Nederlandse tijd
    - cron: '30 6 * * *'

jobs:
  historie:
    runs-on: ubuntu-latest

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Requests installeren
        run: pip install requests

      - name: Bericht sturen
        env:
          HISTORIE_WEBHOOK: ${{ secrets.HISTORIE_WEBHOOK }}
        run: python weerhistorie.py
