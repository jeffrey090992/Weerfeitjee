name: Live Weerbericht

on:
  schedule:
    - cron: '0 * * * *' # Draait elk uur
  workflow_dispatch:

jobs:
  stuur-weer:
    runs-on: ubuntu-latest
    steps:
      - name: Verstuur data naar Discord
        env:
          WUG_API_KEY: ${{ secrets.WUG_API_KEY }}
          WUG_STATION_ID: ${{ secrets.WUG_STATION_ID }}
          DISCORD_WEBHOOK: ${{ secrets.STATION_WEBHOOK }}
        run: |
          # Data ophalen
          RESPONSE=$(curl -s -G "https://api.weather.com/v2/pws/observations/current" \
            -d "stationId=$WUG_STATION_ID" \
            -d "format=json" \
            -d "units=m" \
            -d "apiKey=$WUG_API_KEY")
          
          # Waarden extraheren
          TEMP=$(echo $RESPONSE | jq -r '.observations[0].metric.temp // "N/A"')
          WIND=$(echo $RESPONSE | jq -r '.observations[0].metric.windSpeed // "N/A"')
          HUMID=$(echo $RESPONSE | jq -r '.observations[0].humidity // "N/A"')
          UV=$(echo $RESPONSE | jq -r '.observations[0].uv // "N/A"')
          PRECIP=$(echo $RESPONSE | jq -r '.observations[0].metric.precipTotal // "0"')
          PRESS=$(echo $RESPONSE | jq -r '.observations[0].metric.pressure // "N/A"')
          
          # Versturen naar Discord
          curl -H "Content-Type: application/json" -X POST \
          -d "{
            \"username\": \"Weerstation Home\",
            \"embeds\": [{
              \"title\": \"📍 Weerstation Jef (Almelo)\",
              \"color\": 3447003,
              \"fields\": [
                {\"name\": \"🌡️ Temperatuur\", \"value\": \"$TEMP °C\", \"inline\": true},
                {\"name\": \"🌬️ Wind\", \"value\": \"$WIND km/u\", \"inline\": true},
                {\"name\": \"💧 Luchtvochtigheid\", \"value\": \"$HUMID %\", \"inline\": true},
                {\"name\": \"☀️ UV-Index\", \"value\": \"$UV\", \"inline\": true},
                {\"name\": \"🌧️ Neerslag (vandaag)\", \"value\": \"$PRECIP mm\", \"inline\": true},
                {\"name\": \"🧭 Luchtdruk\", \"value\": \"$PRESS hPa\", \"inline\": true}
              ],
              \"footer\": {\"text\": \"Laatste update\"},
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" $DISCORD_WEBHOOK
