name: Live Weerbericht

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  stuur-weer:
    runs-on: ubuntu-latest
    steps:
      - name: Verstuur data naar Discord
        env:
          WUG_API_KEY: ${{ secrets.WUG_API_KEY }}
          WUG_STATION_ID: ${{ secrets.WUG_STATION_ID }}
          DISCORD_WEBHOOK: ${{ secrets.STATION_WEBHOOK }}
        run: |
          # 1. Data ophalen
          RESPONSE=$(curl -s "https://api.weather.com/v2/pws/observations/current?stationId=$WUG_STATION_ID&format=json&units=m&apiKey=$WUG_API_KEY")
          
          # 2. DEBUG: Print de output in de logs om de structuur te zien
          echo "Ruwe API response:"
          echo $RESPONSE | jq .
          
          # 3. Waarden extraheren (Let op: check in de logs of 'metric' de juiste hoofdmap is)
          TEMP=$(echo $RESPONSE | jq -r '.observations[0].metric.temp')
          WIND=$(echo $RESPONSE | jq -r '.observations[0].metric.windSpeed')
          HUMID=$(echo $RESPONSE | jq -r '.observations[0].humidity')
          
          # 4. Versturen naar Discord
          curl -H "Content-Type: application/json" -X POST \
          -d "{
            \"username\": \"Weerstation Home\",
            \"embeds\": [{
              \"title\": \"📍 Live Weer vanuit de tuin\",
              \"color\": 3447003,
              \"fields\": [
                {\"name\": \"🌡️ Temperatuur\", \"value\": \"$TEMP °C\", \"inline\": true},
                {\"name\": \"🌬️ Wind\", \"value\": \"$WIND km/u\", \"inline\": true},
                {\"name\": \"💧 Luchtvochtigheid\", \"value\": \"$HUMID %\", \"inline\": true}
              ],
              \"footer\": {\"text\": \"Laatste update\"},
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" $DISCORD_WEBHOOK
