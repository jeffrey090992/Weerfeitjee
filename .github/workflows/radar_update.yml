name: Weerradar Discord

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:


jobs:
  radar:
    runs-on: ubuntu-latest

    steps:

      - name: Code ophalen
        uses: actions/checkout@v4


      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"


      - name: Requests installeren
        run: pip install requests


      - name: Radar versturen
        env:
          WEBHOOK_URL: ${{ secrets.WEERRADAR }}
        run: python radar_bot.py
