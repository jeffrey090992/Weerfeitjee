name: Radar Discord Bot

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Dependencies
        run: pip install requests

      - name: Radar sturen
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python radar_bot.py
